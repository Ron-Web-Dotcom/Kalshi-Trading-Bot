name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ bot.py --output-format=github

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pytest pytest-asyncio aiosqlite python-dotenv httpx cryptography openai
      - name: Install package
        run: pip install -e . --no-deps
      - name: Run regression tests
        env:
          # Dummy values so settings don't fail on import
          KALSHI_API_KEY: dummy
          KALSHI_PRIVATE_KEY: dummy
          OPENAI_API_KEY: dummy
          DISCORD_WEBHOOK_URL: dummy
          POLY_API_KEY: dummy
          POLY_API_SECRET: dummy
        run: pytest tests/test_bugs_regression.py -v --tb=short
