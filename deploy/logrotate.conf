# Place this file at /etc/logrotate.d/kalshi-bot
# Rotates bot logs daily, keeps 30 days, compresses old logs

/opt/kalshi-bot/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 kalshi kalshi
    postrotate
        systemctl kill -s HUP kalshi-bot 2>/dev/null || true
    endscript
}
