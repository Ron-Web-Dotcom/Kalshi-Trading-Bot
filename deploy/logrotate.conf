# Place this file at /etc/logrotate.d/kalshi-bot
# Run: sudo cp deploy/logrotate.conf /etc/logrotate.d/kalshi-bot

/root/trading-bot/logs/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    postrotate
        systemctl kill -s HUP kalshi-bot 2>/dev/null || true
    endscript
}
